<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jobsync — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cinzel', 'Times New Roman', serif;
            background: #eef2f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }
        .header { text-align: center; margin-bottom: 28px; }
        .header-jobsync {
            font-family: 'Cinzel', serif;
            font-size: 38px;
            font-weight: 900;
            color: #162E5A;
            letter-spacing: 3px;
            text-transform: uppercase;
            line-height: 1;
        }
        .header-tagline {
            font-family: 'Cinzel', serif;
            font-size: 10.5px;
            font-weight: 600;
            color: #4a6080;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
            text-align: center;
        }
        .right {
            width: 420px;
            background: linear-gradient(160deg, #1F9A94 0%, #1a5276 55%, #162E5A 100%);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 20px 50px rgba(22,46,90,0.28), 0 4px 16px rgba(31,154,148,0.18);
            position: relative;
            overflow: hidden;
        }
        .right::before {
            content: '';
            position: absolute;
            width: 220px; height: 220px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            top: -60px; right: -60px;
            pointer-events: none;
        }
        .right::after {
            content: '';
            position: absolute;
            width: 160px; height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            bottom: -50px; left: -40px;
            pointer-events: none;
        }
        .login-box {
            background: #ffffff;
            padding: 34px 28px 28px;
            border-radius: 14px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.14);
            position: relative;
            z-index: 1;
        }
        .logo {
            width: 60px; height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
            border-radius: 12px;
        }
        .login-box h2 {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            font-weight: 900;
            color: #162E5A;
            margin-bottom: 22px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .divider span { flex: 1; height: 1px; background: #e4eaf2; }
        .divider p {
            font-family: 'Cinzel', serif;
            font-size: 9px;
            color: #aab4c4;
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }
        .login-box label {
            display: block;
            text-align: left;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 5px;
            margin-top: 4px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }
        .input-wrap { position: relative; margin-bottom: 12px; }
        .input-wrap .icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: #a0aec0;
            pointer-events: none;
        }
        .login-box input {
            width: 100%;
            padding: 11px 12px 11px 36px;
            border-radius: 8px;
            border: 1.5px solid #dce3ed;
            outline: none;
            transition: 0.25s;
            font-size: 15px;
            font-weight: 500;
            color: #2d3748;
            background: #f8fafc;
            letter-spacing: 0.5px;
        }
        .login-box input::placeholder { color: #b0bac9; font-weight: 300; }
        .login-box input:focus {
            border-color: #1F9A94;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(31,154,148,0.12);
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            background: linear-gradient(135deg, #1F9A94 0%, #162E5A 100%);
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: all 0.3s;
            color: #fff;
            box-shadow: 0 4px 14px rgba(22,46,90,0.25);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(22,46,90,0.32);
            background: linear-gradient(135deg, #22b0a9 0%, #1a3a6e 100%);
        }
        .btn-login:active { transform: translateY(0); }
        .msg {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 12px;
            padding: 9px 12px;
            border-radius: 7px;
            display: none;
            text-align: left;
        }
        .msg.error   { background: #fff0f0; color: #c0392b; border-left: 3px solid #e74c3c; display: block; }
        .msg.success { background: #f0fff6; color: #1a7a40; border-left: 3px solid #27ae60; display: block; }
        .box-footer {
            margin-top: 18px;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            text-align: center;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
 
    <div class="header">
        <span class="header-jobsync">THE GOJOBSYNC</span>
        <div class="header-tagline">Global Talent &nbsp;|&nbsp; Tech Driven Solution</div>
    </div>
 
    <div class="right">
        <div class="login-box">
            <img src="Logo (1) (1).png" class="logo" alt="Jobsync Logo">
            <h2>CRM</h2>
 
            <div class="divider"><span></span><p>Sign in to continue</p><span></span></div>
 
            <label for="username">Username</label>
            <div class="input-wrap">
                <span class="icon">👤</span>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
            </div>
 
            <label for="password">Password</label>
            <div class="input-wrap">
                <span class="icon">🔒</span>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                <span onclick="togglePassword()" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer; ">👁️</span>
            </div>
 
            <button class="btn-login" onclick="handleLogin()">Login</button>
            <div class="msg" id="msg"></div>
        </div>
 
        <p class="box-footer">© 2026 The Jobsync · All Rights Reserved</p>
    </div>
 
   <script>
    function togglePassword() {

    const password = document.getElementById("password");

    if (password.type === "password") {

        password.type = "text";

    } else {

        password.type = "password";

    }

}
    async function handleLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const msgEl    = document.getElementById("msg");
        const btn      = document.querySelector(".btn-login");

        msgEl.className   = "msg";
        msgEl.textContent = "";

        if (!username || !password) {
            msgEl.textContent = "⚠️ Please enter both username and password.";
            msgEl.className   = "msg error";
            return;
        }

        btn.disabled    = true;
        btn.textContent = "Signing in...";

        try {
            const response = await fetch("/api/auth/login", {
                method:  "POST",
                headers: { "Content-Type": "application/json" },
                body:    JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (data.success) {
                // ── Save ALL session data including token ──
                sessionStorage.setItem('crm_token',        data.token);
                sessionStorage.setItem('crm_role',         data.role);
                sessionStorage.setItem('crm_recruiter_id', String(data.id));
                sessionStorage.setItem('crm_username',     data.username);
                sessionStorage.setItem('crm_user_name',    data.name   || '');
                sessionStorage.setItem('crm_empid',        data.empid  || '');
                sessionStorage.setItem('crm_doj',          data.doj    || '');

                // Set profile for recruiter
                const profileMap = { rec001: 'soundariya', rec002: 'tharshini' };
                if (profileMap[data.username]) {
                    sessionStorage.setItem('crm_profile', profileMap[data.username]);
                } else {
                    sessionStorage.removeItem('crm_profile');
                }

                const redirectMap = {
                    recruiter:   'crm.html',
                    interviewer: 'interview.html',
                    hr:          'placement.html',
                    client:      'client.html',   // ← add this
                    admin:       'admin.html' ,    // ← add this
                    itadmin:     'itadmin.html',
                    superadmin:  'superadmin.html'
                };

                msgEl.textContent = `✅ Welcome, ${data.name || username}! Redirecting...`;
                msgEl.className   = "msg success";

                setTimeout(() => {

                    const dest = redirectMap[data.role];
                    if (!dest) {
                        msgEl.textContent = "❌ Your account has no role assigned. Contact admin.";
                        msgEl.className = "msg error";
                        btn.disabled = false;
                        btn.textContent = "Login";
                        return;
                    }
                    window.location.href = dest;
                }, 800);

            } else {
                btn.disabled    = false;
                btn.textContent = "Login";
                msgEl.textContent = "❌ " + (data.error || "Invalid username or password.");
                msgEl.className   = "msg error";
            }

        } catch (err) {
            btn.disabled    = false;
            btn.textContent = "Login";
            msgEl.textContent = "❌ Cannot connect to server. Please try again.";
            msgEl.className   = "msg error";
        }
    }

    document.addEventListener("keydown", e => {
        if (e.key === "Enter") handleLogin();
    });
</script>
</body>
</html>
